@if (open()) {
  <div
    class="modal-backdrop"
    role="button"
    tabindex="0"
    aria-label="Close"
    (click)="closed.emit()"
    (keydown.escape)="closed.emit()"
  >
    <div
      class="modal-box"
      [class]="boxClass()"
      role="dialog"
      aria-modal="true"
      (click)="$event.stopPropagation()"
      (keydown)="$event.stopPropagation()"
    >
      <ng-content />
    </div>
  </div>
}
