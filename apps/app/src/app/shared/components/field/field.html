@if (label()) {
  <label [for]="fieldId" class="label">
    {{ label() }}
    @if (required()) {
      <span class="text-error ml-0.5">*</span>
    }
  </label>
}
<ng-content />
@if (error()) {
  <p class="mt-1 text-xs text-error">{{ error() }}</p>
} @else if (helpText()) {
  <p class="mt-1 text-xs text-muted">{{ helpText() }}</p>
}
