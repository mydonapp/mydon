<div class="min-h-screen bg-background">

  <!-- Sidebar (desktop only, hidden via Tailwind hidden md:flex) -->
  <aside
    class="sidebar hidden md:flex"
    [class.sidebar--collapsed]="sidebarState.collapsed()"
    aria-label="Main navigation"
  >
    <!-- Logo -->
    <div class="sidebar-header">
      <div class="w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center text-sm font-bold"
        style="background-color: var(--sys-primary); color: var(--sys-on-primary);">
        D
      </div>
      <span class="sidebar-label text-sm font-semibold" style="color: var(--sys-on-surface);">myDon</span>
    </div>

    <!-- Navigation (scrolls independently) -->
    <nav class="sidebar-nav" aria-label="Main">
      <ul class="space-y-px" role="list">
        @for (item of menu; track item.route) {
          <li>
            <a
              [routerLink]="item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: !!item.exact }"
              class="nav-item"
            >
              <app-icon [name]="item.icon" [size]="18" />
              <span class="sidebar-label">{{ item.label | translate }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- Footer — pinned to bottom by flex layout -->
    <div class="sidebar-footer">
      <!-- User profile + dropdown -->
      <div class="sidebar-user-wrap">
        @if (userMenuOpen()) {
          <div class="user-menu" (click)="$event.stopPropagation()">
            <div class="user-menu-item user-menu-item--toggle" (click)="privacyService.toggle()">
              <app-icon [name]="privacyService.isPrivate() ? 'eye-off' : 'eye'" [size]="15" />
              <span class="flex-1">{{ 'views.settings.sections.privacy.privacyMode' | translate }}</span>
              <app-toggle [value]="privacyService.isPrivate()" class="pointer-events-none flex-shrink-0" />
            </div>
            <div class="user-menu-separator"></div>
            <button class="user-menu-item" (click)="goToSettings()">
              <app-icon name="settings" [size]="15" />
              <span>{{ 'components.sidebar.menu.settings' | translate }}</span>
            </button>
            <button class="user-menu-item" (click)="goToManage()">
              <app-icon name="settings-2" [size]="15" />
              <span>{{ 'components.sidebar.menu.manage' | translate }}</span>
            </button>
            <div class="user-menu-separator"></div>
            <button class="user-menu-item user-menu-item--danger" (click)="logout()">
              <app-icon name="log-out" [size]="15" />
              <span>{{ 'components.sidebar.menu.logout' | translate }}</span>
            </button>
          </div>
        }

        <button
          class="sidebar-user"
          (click)="toggleUserMenu($event)"
          [attr.aria-expanded]="userMenuOpen()"
          aria-haspopup="menu"
        >
          <div class="sidebar-avatar">{{ userInitial() }}</div>
          <div class="sidebar-label sidebar-user-info">
            <p class="sidebar-user-name">{{ userService.user()?.name || ('app.user' | translate) }}</p>
            <p class="sidebar-user-email">{{ userService.user()?.email || ('app.userEmail' | translate) }}</p>
          </div>
          <app-icon
            name="chevron-up"
            [size]="14"
            class="sidebar-label sidebar-chevron"
            [class.sidebar-chevron--closed]="!userMenuOpen()"
          />
        </button>
      </div>

      <!-- Collapse toggle -->
      <button
        appBtn variant="ghost" [block]="true"
        class="sidebar-collapse-btn"
        [attr.aria-label]="sidebarState.collapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
        (click)="sidebarState.toggle()"
      >
        @if (sidebarState.collapsed()) {
          <app-icon name="chevron-right" [size]="16" />
        } @else {
          <app-icon name="chevron-left" [size]="16" />
        }
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div
    class="layout-main flex flex-col min-h-screen"
    [class.layout-main--collapsed]="sidebarState.collapsed()"
  >
    <div class="flex-1">
      <router-outlet />
    </div>
  </div>

  <!-- Bottom navigation (mobile only, hidden via Tailwind flex md:hidden) -->
  <nav class="bottom-nav flex md:hidden" aria-label="Main navigation">
    @for (item of menu; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: !!item.exact }"
        class="bottom-nav-item"
      >
        <app-icon [name]="item.icon" [size]="22" />
        <span class="bottom-nav-label">{{ item.label | translate }}</span>
      </a>
    }

    <!-- Profile / user menu -->
    <div class="bottom-nav-profile">
      @if (userMenuOpen()) {
        <div class="user-menu" (click)="$event.stopPropagation()">
          <button class="user-menu-item" (click)="goToSettings()">
            <app-icon name="settings" [size]="15" />
            <span>{{ 'components.sidebar.menu.settings' | translate }}</span>
          </button>
          <button class="user-menu-item" (click)="goToManage()">
            <app-icon name="settings-2" [size]="15" />
            <span>{{ 'components.sidebar.menu.manage' | translate }}</span>
          </button>
          <div class="user-menu-separator"></div>
          <button class="user-menu-item user-menu-item--danger" (click)="logout()">
            <app-icon name="log-out" [size]="15" />
            <span>{{ 'components.sidebar.menu.logout' | translate }}</span>
          </button>
        </div>
      }
      <button
        class="bottom-nav-item bottom-nav-profile-btn"
        (click)="toggleUserMenu($event)"
        [class.active]="userMenuOpen()"
        [attr.aria-expanded]="userMenuOpen()"
        aria-haspopup="menu"
      >
        <div class="bottom-nav-avatar">{{ userInitial() }}</div>
        <span class="bottom-nav-label">{{ userFirstName() || ('app.user' | translate) }}</span>
      </button>
    </div>
  </nav>

  <!-- Top safe area blur (mobile only) -->
  <div class="top-safe-blur md:hidden"></div>

  <app-toast-container />
</div>
