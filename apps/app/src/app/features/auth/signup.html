<div class="min-h-screen bg-background flex items-center justify-center p-4">
  <div class="surface-elevated rounded-xl border border-outline-variant shadow-md w-full max-w-md p-8">
    <div class="text-center mb-6">
      <div class="flex items-center justify-center bg-primary text-on-primary rounded-xl w-16 h-16 mx-auto mb-4">
        <span class="text-2xl font-bold">D</span>
      </div>
      <h1 class="text-2xl font-bold text-primary">myDon</h1>
      <p class="text-on-surface-variant text-sm">{{ 'views.signup.title' | translate }}</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        <app-field [label]="'views.signup.signupForm.name.label' | translate" [required]="true">
          <input appInput type="text" name="name"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            [placeholder]="'views.signup.signupForm.name.placeholder' | translate"
            autocomplete="name"
          />
        </app-field>
        <app-field [label]="'views.signup.signupForm.email.label' | translate" [required]="true">
          <input appInput type="email" name="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            [placeholder]="'views.signup.signupForm.email.placeholder' | translate"
            autocomplete="email"
          />
        </app-field>
        <app-field [label]="'views.signup.signupForm.password.label' | translate" [required]="true">
          <input appInput type="password" name="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            [placeholder]="'views.signup.signupForm.password.placeholder' | translate"
            autocomplete="new-password"
          />
        </app-field>

        <button appBtn type="submit" [block]="true" [loading]="loading()">
          {{ 'views.signup.signupForm.submit.label' | translate }}
        </button>
      </div>
    </form>

    <hr class="border-outline-variant my-4" />
    <p class="text-center text-sm text-on-surface-variant">
      {{ 'views.signup.loginPrompt.text' | translate }}
      <a routerLink="/auth/login" class="text-primary hover:underline ml-1">
        {{ 'views.signup.loginPrompt.link' | translate }}
      </a>
    </p>
  </div>
</div>
