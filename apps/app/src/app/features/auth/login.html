<div class="min-h-screen bg-background flex items-center justify-center p-4">
  <div class="surface-elevated rounded-xl w-full max-w-md p-8 sm:p-10">
    <div class="text-center mb-8">
      <div class="flex items-center justify-center bg-primary text-on-primary rounded-xl w-16 h-16 mx-auto mb-4">
        <span class="text-2xl font-bold">D</span>
      </div>
      <h1 class="text-2xl font-bold text-primary">myDon</h1>
      <p class="text-on-surface-variant text-sm mt-1">{{ 'views.login.title' | translate }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="space-y-4">
        <app-field [label]="'views.login.loginForm.email.label' | translate" [required]="true">
          <input appInput type="email" name="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            [placeholder]="'views.login.loginForm.email.placeholder' | translate"
            autocomplete="email"
          />
        </app-field>
        <div>
          <app-field [label]="'views.login.loginForm.password.label' | translate" [required]="true">
            <input appInput name="password"
              [type]="showPassword() ? 'text' : 'password'"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              [placeholder]="'views.login.loginForm.password.placeholder' | translate"
              autocomplete="current-password"
            />
          </app-field>
          <button type="button" class="text-xs text-on-surface-variant mt-1.5 hover:text-on-surface" (click)="showPassword.update(v => !v)">
            {{ showPassword() ? 'Hide' : 'Show' }} password
          </button>
        </div>

        <button appBtn type="submit" [block]="true" [loading]="loading()">
          {{ 'views.login.loginForm.submit.label' | translate }}
        </button>
      </div>
    </form>

    <div class="h-px bg-outline-variant/50 my-6"></div>
    <p class="text-center text-sm text-on-surface-variant">
      {{ 'views.login.signupPrompt.text' | translate }}
      <a routerLink="/auth/signup" class="text-primary hover:underline ml-1">
        {{ 'views.login.signupPrompt.link' | translate }}
      </a>
    </p>
  </div>
</div>
