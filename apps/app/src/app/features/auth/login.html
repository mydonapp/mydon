<div class="min-h-screen bg-primary flex items-center justify-center p-4">
  <div class="card bg-secondary shadow-xl w-full max-w-md">
    <div class="card-body">
      <div class="text-center mb-6">
        <div class="flex items-center justify-center bg-primary-600 text-white rounded-xl w-16 h-16 mx-auto mb-4">
          <span class="text-2xl font-bold">D</span>
        </div>
        <h1 class="text-2xl font-bold text-primary-400">myDon</h1>
        <p class="text-secondary text-sm">{{ 'views.login.title' | translate }}</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="space-y-4">
          <app-base-input
            [value]="email()"
            (valueChange)="email.set($event)"
            type="email"
            [label]="'views.login.loginForm.email.label' | translate"
            [placeholder]="'views.login.loginForm.email.placeholder' | translate"
            [required]="true"
            autocomplete="email"
          />
          <div>
            <app-base-input
              [value]="password()"
              (valueChange)="password.set($event)"
              [type]="showPassword() ? 'text' : 'password'"
              [label]="'views.login.loginForm.password.label' | translate"
              [placeholder]="'views.login.loginForm.password.placeholder' | translate"
              [required]="true"
              autocomplete="current-password"
            />
            <button type="button" class="text-xs text-secondary mt-1" (click)="showPassword.update(v => !v)">
              {{ showPassword() ? 'Hide' : 'Show' }} password
            </button>
          </div>

          <app-base-button
            type="submit"
            variant="primary"
            [block]="true"
            [loading]="loading()"
          >
            {{ 'views.login.loginForm.submit.label' | translate }}
          </app-base-button>
        </div>
      </form>

      <div class="divider my-4"></div>
      <p class="text-center text-sm text-secondary">
        {{ 'views.login.signupPrompt.text' | translate }}
        <a routerLink="/auth/signup" class="text-primary-400 hover:underline ml-1">
          {{ 'views.login.signupPrompt.link' | translate }}
        </a>
      </p>
    </div>
  </div>
</div>
